<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>শিহাব এন্টারপ্রাইজ</title>

<style>
/* ==================== BASE STYLES ==================== */
body { 
  margin: 0; 
  font-family: 'Segoe UI', sans-serif; 
  color: #333; 
  background: #f7f8fa;
}

h2 { color: #0d6efd; text-align: center; margin: 20px 0 10px; }

.container { padding: 0 15px; max-width: 1024px; margin: auto; }

/* ==================== HEADER ==================== */
header {
  background: linear-gradient(45deg,#0d6efd,#0a58ca);
  color: white;
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  flex-wrap: wrap;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  position: relative;
  border-bottom: 2px solid #0a58ca;
  border-radius: 0 0 12px 12px;
}

.header-left { flex: 1; }

.header-center {
  display: flex;
  align-items: center;
  justify-content: center;
  flex: 2;
  gap: 10px;
}

header img.logo-small { 
  height: 50px; 
  width: auto; 
  border-radius: 6px; 
}

header h1 {
  margin: 0;
  font-size: 22px;
  text-align: center;
}

/* HEADER BUTTONS */
.header-buttons {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.header-buttons button {
  background: rgba(255,255,255,0.15);
  color: white;
  border: none;
  padding: 8px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
  transition: all 0.3s ease;
}

.header-buttons button:hover {
  background: white;
  color: #0d6efd;
  transform: translateY(-2px);
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}

/* LANGUAGE SWITCHER */
.header-buttons .language-switcher select {
  padding: 6px 10px;
  font-size: 14px;
  border-radius: 6px;
  border: 1px solid rgba(255,255,255,0.6);
  background: rgba(255,255,255,0.15);
  color: white;
  cursor: pointer;
  transition: all 0.3s ease;
}

.header-buttons .language-switcher select:hover {
  background: white;
  color: #0d6efd;
  border-color: #0d6efd;
}

/* ==================== RESPONSIVE ==================== */
@media (max-width: 768px) {
  header { flex-direction: column; align-items: center; text-align: center; }
  .header-center { flex-direction: column; gap: 4px; margin: 6px 0; }
  .header-buttons { flex-direction: column; width: 100%; margin-top: 8px; }
  .header-buttons button, .header-buttons .language-switcher { width: 100%; margin-bottom: 6px; }
  .header-buttons button:last-child, .header-buttons .language-switcher:last-child { margin-bottom: 0; }
}

/* ==================== HERO ==================== */
.hero {
  background: url('logo.png') no-repeat center center;
  background-size: 250px auto;
  text-align: center;
  padding: 80px 15px 60px;
  margin-bottom: 20px;
  border-radius: 12px;
  position: relative;
}

.hero::before {
  content: "";
  position: absolute;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(230, 239, 255, 0.85);
  border-radius: 12px;
  z-index: 0;
}

.hero h2, .hero p { position: relative; z-index: 1; }
.hero h2 { margin-bottom: 12px; font-size: 22px; }
.hero p { font-size: 16px; max-width: 680px; margin: auto; line-height: 1.5; }

/* ==================== PRODUCTS ==================== */
.products { 
  display: grid; 
  gap: 20px; 
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
  margin-bottom: 30px; 
}

.product-card { 
  background: #fff; 
  border-radius: 8px; 
  box-shadow: 0 4px 10px rgba(0,0,0,0.07); 
  padding: 16px; 
  text-align: center; 
  cursor: default; 
  transition: transform .2s, box-shadow .2s; 
}

.product-card:hover { 
  transform: translateY(-4px); 
  box-shadow: 0 8px 18px rgba(0,0,0,0.12); 
}

.product-card img { width: 100%; height: 140px; object-fit: cover; border-radius: 6px; margin-bottom: 10px; }
.product-card h3 { margin: 6px 0; font-size: 16px; color: #0d6efd; }
.product-card p { font-size: 14px; color: #555; }
.btn-see { background: #0d6efd; color: white; padding: 8px 12px; border-radius: 6px; font-size: 14px; margin-top: 8px; cursor: pointer; transition: 0.3s; }
.btn-see:hover { opacity: 0.9; transform: translateY(-2px); }

/* ==================== ORDER FORM ==================== */
form { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); margin-bottom: 30px; }

.form-group { margin-bottom: 14px; }

form label { display: block; font-size: 14px; margin-bottom: 6px; font-weight: 600; }

form input, form textarea, form select { 
  width: 100%; 
  padding: 10px; 
  border-radius: 6px; 
  border: 1px solid #ccc; 
  font-size: 14px; 
}

form input:focus, form textarea:focus, form select:focus { 
  outline: none; 
  border-color: #0d6efd; 
}

button.order-btn { 
  background: #0d6efd; 
  color: white; 
  font-size: 16px; 
  padding: 12px; 
  margin-top: 12px; 
  border: none; 
  border-radius: 6px; 
  cursor: pointer; 
  width: 48%; 
  margin-right: 2%; 
  transition: 0.3s; 
}

button.order-btn:last-child { margin-right: 0; }

button.order-btn:hover { opacity: 0.95; transform: translateY(-2px); }

/* ==================== MULTI SELECT ==================== */
.multi-select-list { border: 1px solid #ccc; border-radius: 8px; padding: 12px; max-height: 320px; overflow-y: auto; }

.multi-select-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; min-height: 48px; }
.multi-select-item:last-child { border-bottom: none; }

.multi-select-item label { display: flex; align-items: center; gap: 10px; cursor: pointer; flex: 1; }
.multi-select-item label input[type="checkbox"] { width: 18px; height: 18px; margin: 0; }

.multi-select-item span { font-weight: 600; }

.multi-select-item .qty-unit { display: flex; gap: 8px; align-items: center; }
.multi-select-item .qty-unit input[type="number"] { width: 60px; padding: 6px; border-radius:6px; border:1px solid #ccc; }
.multi-select-item .qty-unit select { padding: 6px; border-radius:6px; }

/* ==================== MODAL ==================== */
.modal-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 9999; }
.modal-box { width: 90%; max-width: 500px; background: white; border-radius: 12px; padding: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.2); text-align: left; }
.modal-box h3 { margin-top: 0; color: #0d6efd; }
.modal-box p { line-height: 1.6; font-size: 14px; color: #444; margin-bottom: 10px; }
.modal-close { float: right; font-size: 18px; cursor: pointer; color: #888; }
.modal-close:hover { color: #000; }

/* ==================== FOOTER ==================== */
footer { text-align: center; padding: 14px; color: #777; font-size: 14px; }

</style>
</head>

// ========== RENDER FUNCTIONS ==========

// Hero typing animation
const typingText = document.getElementById("typingText");
function typeHeroText(txt){
  let i=0;
  typingText.textContent="";
  const interval = setInterval(()=>{
    if(i<txt.length){ typingText.textContent += txt[i]; i++; }
    else clearInterval(interval);
  },80);
}

// Render product cards
function renderProducts(){
  const container = document.getElementById("productCards");
  container.innerHTML="";
  texts[language].products.forEach((p,i)=>{
    const card = document.createElement("div");
    card.className="product-card";
    card.innerHTML=`
      <img src="${i+1}.jpg" alt="${p.name}">
      <h3>${p.name}</h3>
      <p>${p.details}</p>
      <button class="btn-see">${language==='bn'?'অর্ডার করুন':'Order Now'}</button>
    `;
    card.querySelector(".btn-see").onclick = ()=>{
      window.location.href = `p${i+1}.html`;
    };
    container.appendChild(card);
  });
}

// Multi select product list
function renderMultiSelectProducts(){
  const container = document.getElementById("multiSelectProductsList");
  container.innerHTML="";

  texts[language].products.forEach((p,i)=>{

    let unitOptions = "";

    // ===== Gypsum Board units =====
    if(p.name.toLowerCase().includes("board") || p.name.includes("বোর্ড")){
      unitOptions = `
        <option value="${language==='bn'?'পিস':'Piece'}">
        ${language==='bn'?'পিস':'Piece'}
        </option>
      `;
    }

    // ===== Other products units =====
    else{
      unitOptions = texts[language].units
        .map(u=>`<option value="${u.value}">${u.text}</option>`)
        .join("");
    }

    const div = document.createElement("div");
    div.className="multi-select-item";

    div.innerHTML=`
      <label>
        <input type="checkbox" value="${p.name}">
        <span>${p.name}</span>
      </label>

      <div class="qty-unit">
        <input type="number" min="0" value="0">
        <select>
          ${unitOptions}
        </select>
      </div>
    `;

    container.appendChild(div);

  });
}
// ==================== GYPSUM NOTE ====================
function updateGypsumNote() {
  const noteEl = document.getElementById("gypsumNote");
  if(language==='bn'){
    noteEl.textContent = "বিশেষ দ্রষ্টব্য:জিপসাম বোর্ড অর্ডার করার সময় সঠিক পরিমাণ ও মাপ জানতে WhatsApp/Email-এ যোগাযোগ করে অর্ডার প্লেস করতে হবে।";
  } else {
    noteEl.textContent = "Note: For Gypsum board orders, you must contact via WhatsApp/Email to confirm the correct quantity and size before placing the order.";
  }
}

  document.getElementById("address").placeholder = texts[language].placeholderAddress;
  document.getElementById("btnWhatsApp").textContent = texts[language].btnWhatsApp;
  document.getElementById("btnEmail").textContent = texts[language].btnEmail;
  document.getElementById("footerText").textContent = texts[language].footer;
  typeHeroText(texts[language].heroText);
  renderProducts();
  renderMultiSelectProducts();
  updateGypsumNote(); // <-- update gypsum note
}

function showModal(title,desc){
  document.getElementById("modalTitle").textContent=title;
  document.getElementById("modalDesc").textContent=desc;
  document.getElementById("modalBg").style.display="flex";
}
function closeModal(){ document.getElementById("modalBg").style.display="none"; }

updateLanguage();
