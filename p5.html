<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GYPSUM BOARD-2</title>
<style>
body {
  font-family: Poppins, sans-serif;
  background: #f4f7fb;
  margin: 0;
  padding: 0;
  color: #333;
}
.container {
  max-width: 900px;
  margin: 20px auto;
  padding: 20px;
  background: white;
  box-sizing: border-box;
  border-radius: 12px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.1);
}
h1 {
  font-size: 28px;
  color: #0d6efd;
  text-align: center;
  margin-bottom: 20px;
}
img {
  width: 100%;
  height: auto;
  border-radius: 10px;
  display: block;
  margin-bottom: 20px;
}
#info {
  font-size: 16px;
  line-height: 1.7;
  margin-bottom: 25px;
}
button {
  background: #0d6efd;
  border: none;
  color: white;
  padding: 10px 18px;
  border-radius: 6px;
  cursor: pointer;
  margin: 5px 0;
  transition: 0.3s;
}
button:hover { background: #084298; }
input, textarea, select {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  margin-bottom: 15px;
  border: 1px solid #ccc;
  border-radius: 6px;
  font-size: 16px;
  box-sizing: border-box;
}
.order-title { font-weight: 600; color: #0d6efd; font-size: 22px; margin-bottom: 10px; }
.note { font-size: 14px; color: red; margin-bottom: 10px; }
@media (max-width:600px){
  h1 { font-size: 24px; }
  .order-title { font-size: 20px; }
  input, textarea, select { font-size: 14px; }
  button { width: 100%; padding: 12px 0; }
}
</style>
</head>
<body>

<div class="container">
  <button onclick="switchLang()">বাংলা / English</button>
  <h1 id="title">GYPSUM BOARD-2</h1>

  <img src="5.jpg" alt="Gypsum Board 2">

  <div id="info"></div>

  <div class="order-box">
    <div class="order-title" id="orderTitle">🛒 Place Order</div>
    <div class="note" id="minOrder">Minimum Order: 100 Piece</div>

    <label id="labelName">Your Name</label>
    <input type="text" id="name" placeholder="Enter your name">

    <label id="labelPhone">Phone Number</label>
    <input type="text" id="phone" placeholder="01XXXXXXXXX">

    <label id="labelQty">Quantity</label>
    <input type="number" id="qty" value="100" min="1">

    <label id="labelUnit">Unit</label>
    <select id="unit">
      <option>Piece</option>
    </select>

    <label id="labelAddress">Address</label>
    <textarea id="address" placeholder="Enter your address"></textarea>

    <div style="text-align:center">
      <button id="btnWhatsApp">Order via WhatsApp</button>
      <button id="btnEmail">Order via Email</button>
    </div>
  </div>
</div>

<script>
let lang = "en";

const texts = {
  en: {
    title: "GYPSUM BOARD-2",
    info: `<ul>
<li><strong>Material:</strong> Gypsum + Fiber</li>
<li><strong>Use:</strong> Interior wall & ceiling construction</li>
<li><strong>Packaging:</strong> 8ft x 4ft Board</li>
<li><strong>Feature:</strong> Strong, smooth surface</li>
<li><strong>Safety:</strong> Use safety gear during installation</li>
<li><strong>Storage:</strong> Store in dry, cool place</li>
</ul>`,
    orderTitle: "🛒 Place Order",
    minOrder: "Minimum Order: 100 Piece",
    labelName: "Your Name",
    labelPhone: "Phone Number",
    labelQty: "Quantity",
    labelUnit: "Unit",
    unitOptions: ["Piece"],
    labelAddress: "Address",
    addressPlaceholder: "Enter your address",
    btnWhatsApp: "Order via WhatsApp",
    btnEmail: "Order via Email"
  },
  bn: {
    title: "জিপসাম বোর্ড-২",
    info: `<ul>
<li><strong>উপাদান:</strong> জিপসাম + ফাইবার</li>
<li><strong>ব্যবহার:</strong> অভ্যন্তরীণ দেয়াল ও ছাদ নির্মাণ</li>
<li><strong>প্যাকেজিং:</strong> 8ft x 4ft বোর্ড</li>
<li><strong>ফিচার:</strong> দৃঢ়, সমান পৃষ্ঠ</li>
<li><strong>সেফটি:</strong> ইনস্টলেশনের সময় সুরক্ষা সরঞ্জাম ব্যবহার করুন</li>
<li><strong>স্টোরেজ:</strong> শুকনো ও শীতল স্থানে রাখুন</li>
</ul>`,
    orderTitle: "🛒 অর্ডার করুন",
    minOrder: "সর্বনিম্ন অর্ডার: ১০০ পিস",
    labelName: "আপনার নাম",
    labelPhone: "ফোন নাম্বার",
    labelQty: "পরিমাণ",
    labelUnit: "একক",
    unitOptions: ["পিস"],
    labelAddress: "ঠিকানা",
    addressPlaceholder: "আপনার ঠিকানা লিখুন",
    btnWhatsApp: "হোয়াটসঅ্যাপে অর্ডার করুন",
    btnEmail: "ইমেইলে অর্ডার করুন"
  }
};

function switchLang() {
  lang = lang === "en" ? "bn" : "en";

  document.getElementById("title").innerText = texts[lang].title;
  document.getElementById("info").innerHTML = texts[lang].info;

  document.getElementById("orderTitle").innerText = texts[lang].orderTitle;
  document.getElementById("minOrder").innerText = texts[lang].minOrder;
  document.getElementById("labelName").innerText = texts[lang].labelName;
  document.getElementById("labelPhone").innerText = texts[lang].labelPhone;
  document.getElementById("labelQty").innerText = texts[lang].labelQty;
  document.getElementById("labelUnit").innerText = texts[lang].labelUnit;

  const unitSelect = document.getElementById("unit");
  unitSelect.innerHTML = "";
  texts[lang].unitOptions.forEach(opt => {
    const option = document.createElement("option");
    option.textContent = opt;
    option.value = opt;
    unitSelect.appendChild(option);
  });

  document.getElementById("labelAddress").innerText = texts[lang].labelAddress;
  document.getElementById("address").placeholder = texts[lang].addressPlaceholder;
  document.getElementById("btnWhatsApp").innerText = texts[lang].btnWhatsApp;
  document.getElementById("btnEmail").innerText = texts[lang].btnEmail;
}

function getMessage() {
  return `${texts[lang].orderTitle} (%0A${texts[lang].minOrder})%0A
${texts[lang].labelName}: ${document.getElementById("name").value}%0A
${texts[lang].labelPhone}: ${document.getElementById("phone").value}%0A
${texts[lang].labelQty}: ${document.getElementById("qty").value}%0A
${texts[lang].labelUnit}: ${document.getElementById("unit").value}%0A
${texts[lang].labelAddress}: ${document.getElementById("address").value}`;
}

document.getElementById("btnWhatsApp").onclick = () => {
  window.open(`https://wa.me/8801872481201?text=${getMessage()}`, "_blank");
};

document.getElementById("btnEmail").onclick = () => {
  window.location.href = `mailto:Sihab5224@gmail.com?subject=New Order&body=${getMessage().replace(/%0A/g,"\n")}`;
};

// Initial load
document.getElementById("info").innerHTML = texts[lang].info;
</script>

</body>
</html>
